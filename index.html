<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather forecast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column justify-content-center align-items-center vh-100">
    <div id="weather-box" class="text-center mb-4">
        <h2 id="city-name" class="mb-3">Loading.....</h2>
        <p id="temperature" class="mb-2"></p>
        <p id="description" class="mb-2"></p>
        <p id="error-message" class="text-danger"></p>
    </div>
    <form class="d-flex gap-2 justify-content-center align-items-center">
        <input type="text" id="city-input" class="form-control" style="max-width: 240px;" placeholder="Enter city name" required>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
